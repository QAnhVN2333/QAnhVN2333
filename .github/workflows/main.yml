name: Metrics

on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: lowlighter/metrics@latest
        with:
          user: QAnhVN2333
          token: ${{ secrets.GITHUB_TOKEN }}

          base: ""
          config_timezone: Asia/Ho_Chi_Minh

          plugin_languages: yes
          plugin_isocalendar: yes
          plugin_lines: yes
          plugin_stars: yes
